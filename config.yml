          title: Do Won Kim
          subtitle: |-
            I am a PhD candidate in Information at the University of Maryland,
            advised by <a href="https://glciampaglia.com/" target="_blank" class="redlink">Giovanni Luca Ciampaglia</a>
            and <a href="http://cody.bunta.in/" target="_blank" class="redlink">Cody Buntain</a>.
            I am also a student affiliate at <a href="https://www.trails.umd.edu/" target="_blank" class="redlink">TRAILS</a>
            (The Institute for Trustworthy AI in Law and Society).
            <br/><br/>
            My research lies at the intersection of computational social science and human-AI interaction. I examine how AI-driven information systems shape political behavior and democratic outcomes. Using computational and experimental methods, I study how interventions in digital information environments can reduce misinformation, mitigate political polarization, and strengthen democratic trust.
            For more details, see my <a href="/dissertation/" target="_blank" class="redlink">Dissertation Projects</a>.
            </p>
            <br/>
            Beyond my dissertation's focus on political information and democratic processes, I study how emerging information technologies shape broader online information environments. This includes work from the <a href="https://rankingchallenge.substack.com/p/announcing-the-finalists-of-the-prosocial" target="_blank" class="redlink">Prosocial Ranking Challenge</a> and research on using LLMs to better align news feed recommendations with users' stated values. I am also interested in how AI is reshaping the production of scientific knowledge itself.
            <br/> <br/>  

